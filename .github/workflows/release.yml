name: Release and trigger Homebrew

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    outputs:
      new_release_published: ${{ steps.release_meta.outputs.new_release_published }}
      new_release_version: ${{ steps.release_meta.outputs.new_release_version }}
      new_release_git_tag: ${{ steps.release_meta.outputs.new_release_git_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm install

      - name: Install Python build tool
        run: |
          python -m pip install --upgrade pip build

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          npx semantic-release | tee semantic-release.log

      - name: Detect release metadata
        id: release_meta
        shell: bash
        run: |
          if grep -q "Published release" semantic-release.log; then
            TAG="$(git describe --tags --abbrev=0)"
            VERSION="${TAG#v}"
            echo "new_release_published=true" >> "$GITHUB_OUTPUT"
            echo "new_release_version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "new_release_git_tag=${TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "new_release_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build source distribution
        if: steps.release_meta.outputs.new_release_published == 'true'
        shell: bash
        run: |
          rm -rf dist out
          mkdir -p out
          python -m build --sdist

          SRC_TARBALL="$(find dist -maxdepth 1 -name '*.tar.gz' | head -n 1)"
          test -n "$SRC_TARBALL"
          test -f "$SRC_TARBALL"

          cp "$SRC_TARBALL" "out/mb-aws-helper-${{ steps.release_meta.outputs.new_release_version }}.tar.gz"
          ls -lah dist out

      - name: Validate source artifact exists
        if: steps.release_meta.outputs.new_release_published == 'true'
        shell: bash
        run: |
          test -f "out/mb-aws-helper-${{ steps.release_meta.outputs.new_release_version }}.tar.gz"

      - name: Upload tar.gz to GitHub Release
        if: steps.release_meta.outputs.new_release_published == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.new_release_git_tag }}
          files: out/mb-aws-helper-${{ steps.release_meta.outputs.new_release_version }}.tar.gz

      - name: Wait for GitHub release asset to become available
        if: steps.release_meta.outputs.new_release_published == 'true'
        shell: bash
        env:
          VERSION: ${{ steps.release_meta.outputs.new_release_version }}
          TAG: ${{ steps.release_meta.outputs.new_release_git_tag }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          URL="https://github.com/${SOURCE_REPO}/releases/download/${TAG}/mb-aws-helper-${VERSION}.tar.gz"

          for i in {1..12}; do
            echo "Checking asset availability, attempt $i..."
            if curl -fL "$URL" -o /dev/null >/dev/null 2>&1; then
              echo "Asset is available: $URL"
              exit 0
            fi

            echo "Asset not available yet, waiting 10 seconds..."
            sleep 10
          done

          echo "Asset did not become available in time: $URL"
          exit 1

      - name: Trigger Homebrew tap
        if: steps.release_meta.outputs.new_release_published == 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_PAT }}
          VERSION: ${{ steps.release_meta.outputs.new_release_version }}
          TAG: ${{ steps.release_meta.outputs.new_release_git_tag }}
          SOURCE_REPO: ${{ github.repository }}
        shell: bash
        run: |
          curl -f -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/fredfrazao/homebrew-mb-aws-helper/dispatches \
            -d "{
              \"event_type\": \"new-release\",
              \"client_payload\": {
                \"version\": \"${VERSION}\",
                \"tag\": \"${TAG}\",
                \"source_repo\": \"${SOURCE_REPO}\",
                \"asset_name\": \"mb-aws-helper-${VERSION}.tar.gz\"
              }
            }"